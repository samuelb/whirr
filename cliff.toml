# git-cliff configuration (https://git-cliff.org) for the release notes
# generated by the Release workflow. Kept structurally identical to somad's
# cliff.toml -- only the compare-link URL differs.
#
# Commits are expected to follow Conventional Commits (feat:, fix:, docs:,
# refactor:, perf:, test:, chore:, ci:, build:). Anything else lands in the
# "Other" group rather than being dropped.

[changelog]
header = "## Changes\n"
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | split(pat="\n") | first | upper_first }} ({{ commit.id | truncate(length=7, end="") }})
{% endfor %}\
{% endfor %}
{% if previous.version %}\
**Full Changelog**: https://github.com/samuelb/whirr/compare/{{ previous.version }}...{{ version }}
{% endif %}\
"""
trim = true

[git]
conventional_commits = true
# Keep non-conforming commits (they fall through to the "Other" parser below)
# instead of silently dropping them -- important for pre-convention history.
filter_unconventional = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "newest"
commit_parsers = [
  { message = "^Release v", skip = true },
  { message = "^Merge ", skip = true },
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactoring" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^(build|ci|chore)", group = "<!-- 6 -->Miscellaneous" },
  { message = ".*", group = "<!-- 7 -->Other" },
]
