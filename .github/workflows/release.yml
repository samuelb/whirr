name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------- Prepare
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate tag
        run: |
          tag="${{ inputs.tag }}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$tag' must look like vX.Y.Z"; exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "::error::Tag '$tag' already exists"; exit 1
          fi

      - name: Bump version and changelog
        id: bump
        env:
          TAG: ${{ inputs.tag }}
        run: |
          sh scripts/bump-version.sh "${TAG#v}" "$GITHUB_REPOSITORY"
          if git diff --quiet; then
            echo "::error::Nothing to bump — the project is already at ${TAG#v}."; exit 1
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -am "Release $TAG"
          git push origin "HEAD:$GITHUB_REF_NAME"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------- Linux
  linux:
    name: Linux ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libayatana-appindicator3-dev libasound2-dev libxdo-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Build .deb and .rpm
        run: |
          cargo deb --no-build
          cargo generate-rpm

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/debian/*.deb "dist/"
          cp target/generate-rpm/*.rpm "dist/"
          tar -C target/release -czf "dist/gibbon-linux-${{ matrix.arch }}.tar.gz" gibbon
          ( cd dist && sha256sum * > "SHA256SUMS-linux-${{ matrix.arch }}.txt" )

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------- macOS (universal)
  macos:
    name: macOS (universal)
    needs: prepare
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build (Apple Silicon + Intel)
        run: |
          cargo build --release --locked --target aarch64-apple-darwin
          cargo build --release --locked --target x86_64-apple-darwin

      - name: Create universal binary and app bundle
        run: |
          mkdir -p dist
          lipo -create -output dist/gibbon-universal \
            target/aarch64-apple-darwin/release/gibbon \
            target/x86_64-apple-darwin/release/gibbon
          bash packaging/macos/bundle.sh dist/gibbon-universal dist
          ( cd dist && shasum -a 256 gibbon-macos.dmg > SHA256SUMS-macos.txt )

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: |
            dist/gibbon-macos.dmg
            dist/SHA256SUMS-macos.txt
          if-no-files-found: error

  # ---------------------------------------------------------------- Windows
  windows:
    name: Windows (x64)
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Chocolatey doesn't shim makensis onto PATH, so add its install dir.
          "${env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build installer (NSIS)
        shell: pwsh
        run: |
          $version = "${{ inputs.tag }}" -replace '^v',''
          # The script's File/icon paths are relative to packaging\windows.
          Push-Location packaging\windows
          makensis "/DVERSION=$version" installer.nsi
          Pop-Location
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Move-Item packaging\windows\gibbon-setup-*.exe dist\
          Copy-Item target\release\gibbon.exe dist\gibbon-windows-x64.exe
          # Hash the artifacts only; globbing dist\* would include (and lock) the output file.
          $files = Get-ChildItem dist -File | Where-Object { $_.Name -ne 'SHA256SUMS-windows.txt' }
          Get-FileHash $files -Algorithm SHA256 | Out-File dist\SHA256SUMS-windows.txt

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------- Publish
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [prepare, linux, macos, windows]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Stage source archive and Arch PKGBUILD
        run: |
          version="${TAG#v}"
          sh scripts/stage-arch-release.sh "$version" dist
        env:
          TAG: ${{ inputs.tag }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          generate_release_notes: true
          make_latest: true
          files: dist/*
          fail_on_unmatched_files: true
