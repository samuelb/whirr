name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------- Prepare
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate tag
        run: |
          tag="${{ inputs.tag }}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$tag' must look like vX.Y.Z"; exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "::error::Tag '$tag' already exists"; exit 1
          fi

      - name: Bump version
        id: bump
        env:
          TAG: ${{ inputs.tag }}
        run: |
          sh scripts/bump-version.sh "${TAG#v}"
          if git diff --quiet; then
            echo "::error::Nothing to bump — the project is already at ${TAG#v}."; exit 1
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -am "Release $TAG"
          git push origin "HEAD:$GITHUB_REF_NAME"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------- Linux
  linux:
    name: Linux ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libayatana-appindicator3-dev libasound2-dev libxdo-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm --locked

      - name: Build .deb and .rpm
        run: |
          cargo deb --no-build
          cargo generate-rpm

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/debian/*.deb "dist/"
          cp target/generate-rpm/*.rpm "dist/"
          tar -C target/release -czf "dist/whirr-linux-${{ matrix.arch }}.tar.gz" whirr
          ( cd dist && sha256sum * > "SHA256SUMS-linux-${{ matrix.arch }}.txt" )

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------- macOS (universal)
  macos:
    name: macOS (universal)
    needs: prepare
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build (Apple Silicon + Intel)
        run: |
          cargo build --release --locked --target aarch64-apple-darwin
          cargo build --release --locked --target x86_64-apple-darwin

      - name: Create universal binary and app bundle
        run: |
          mkdir -p dist
          lipo -create -output dist/whirr-universal \
            target/aarch64-apple-darwin/release/whirr \
            target/x86_64-apple-darwin/release/whirr
          bash packaging/macos/bundle.sh dist/whirr-universal dist
          ( cd dist && shasum -a 256 whirr-macos.dmg > SHA256SUMS-macos.txt )

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: |
            dist/whirr-macos.dmg
            dist/SHA256SUMS-macos.txt
          if-no-files-found: error

  # ---------------------------------------------------------------- Windows
  windows:
    name: Windows (x64)
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Chocolatey doesn't shim makensis onto PATH, so add its install dir.
          "${env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build installer (NSIS)
        shell: pwsh
        run: |
          $version = "${{ inputs.tag }}" -replace '^v',''
          # The script's File/icon paths are relative to packaging\windows.
          Push-Location packaging\windows
          makensis "/DVERSION=$version" installer.nsi
          Pop-Location
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Move-Item packaging\windows\whirr-setup-*.exe dist\
          Copy-Item target\release\whirr.exe dist\whirr-windows-x64.exe
          # Hash the artifacts only; globbing dist\* would include (and lock) the output file.
          $files = Get-ChildItem dist -File | Where-Object { $_.Name -ne 'SHA256SUMS-windows.txt' }
          Get-FileHash $files -Algorithm SHA256 | Out-File dist\SHA256SUMS-windows.txt

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------- Publish
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [prepare, linux, macos, windows]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          # Full history + tags so the notes step can diff against the last tag.
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Stage source archive and Arch PKGBUILD
        run: |
          version="${TAG#v}"
          sh scripts/stage-arch-release.sh "$version" dist
        env:
          TAG: ${{ inputs.tag }}

      - name: Build release notes
        env:
          TAG: ${{ inputs.tag }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          # Last tag reachable from the release commit's parent (the new tag is
          # created by the release step below, so it isn't counted here).
          prev="$(git describe --tags --abbrev=0 "$SHA^" 2>/dev/null || true)"
          range="${prev:+$prev..}$SHA"
          {
            echo "## Changes"
            echo
            # One bullet per commit, skipping the automated "Release vX.Y.Z" bump.
            git log --no-merges --invert-grep --grep='^Release v' \
              --pretty='- %s (%h)' "$range"
            if [ -n "$prev" ]; then
              echo
              echo "**Full Changelog**: https://github.com/$GITHUB_REPOSITORY/compare/$prev...$TAG"
            fi
          } > release-notes.md
          cat release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          body_path: release-notes.md
          make_latest: true
          files: dist/*
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------- Homebrew tap
  # Push the refreshed cask to samuelb/homebrew-tap so `brew upgrade` picks up
  # the new release. Requires a HOMEBREW_TAP_TOKEN secret: a PAT (or fine-grained
  # token) with write access to the tap repo (the default GITHUB_TOKEN can't push
  # to another repository).
  homebrew:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: [prepare, macos, publish]
    steps:
      - name: Check out whirr (for the cask template + stage script)
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Download the macOS .dmg
        uses: actions/download-artifact@v4
        with:
          name: dist-macos
          path: dist

      - name: Check out the Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: samuelb/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Regenerate the cask
        env:
          TAG: ${{ inputs.tag }}
        run: |
          sh scripts/stage-homebrew-cask.sh "${TAG#v}" dist/whirr-macos.dmg tap/Casks/whirr.rb

      - name: Commit and push
        working-directory: tap
        env:
          TAG: ${{ inputs.tag }}
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- Casks/whirr.rb; then
            echo "Cask already up to date for $TAG."; exit 0
          fi
          git commit -am "whirr ${TAG#v}"
          git push
