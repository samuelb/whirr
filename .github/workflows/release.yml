name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------- Prepare
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Validate tag
        run: |
          tag="${{ inputs.tag }}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$tag' must look like vX.Y.Z"; exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "::error::Tag '$tag' already exists"; exit 1
          fi

      - name: Bump version
        id: bump
        env:
          TAG: ${{ inputs.tag }}
        run: |
          sh scripts/bump-version.sh "${TAG#v}"
          if git diff --quiet; then
            echo "::error::Nothing to bump — the project is already at ${TAG#v}."; exit 1
          fi
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git commit -am "Release $TAG"
          git push origin "HEAD:$GITHUB_REF_NAME"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------- Linux
  linux:
    name: Linux ${{ matrix.arch }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libayatana-appindicator3-dev libasound2-dev libxdo-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      # .deb/.rpm packaging happens in the publish job (nfpm, both arches at
      # once); this job only ships the binary tarball.
      - name: Stage artifacts
        run: |
          mkdir -p dist
          tar -C target/release -czf "dist/whirr-linux-${{ matrix.arch }}.tar.gz" whirr

      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------- macOS (universal)
  macos:
    name: macOS (universal)
    needs: prepare
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build (Apple Silicon + Intel)
        run: |
          cargo build --release --locked --target aarch64-apple-darwin
          cargo build --release --locked --target x86_64-apple-darwin

      - name: Create universal binary, app bundle and tarball
        run: |
          mkdir -p dist
          lipo -create -output dist/whirr-universal \
            target/aarch64-apple-darwin/release/whirr \
            target/x86_64-apple-darwin/release/whirr
          bash packaging/macos/bundle.sh dist/whirr-universal dist
          # Plain-binary tarball for the Homebrew formula (the .dmg carries
          # the .app for the cask).
          STAGE="$(mktemp -d)"
          install -m 0755 dist/whirr-universal "$STAGE/whirr"
          tar -C "$STAGE" -czf dist/whirr-macos-universal.tar.gz whirr

      - uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: |
            dist/whirr-macos.dmg
            dist/whirr-macos-universal.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------- Windows
  windows:
    name: Windows (x64)
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # Chocolatey doesn't shim makensis onto PATH, so add its install dir.
          "${env:ProgramFiles(x86)}\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build installer (NSIS)
        shell: pwsh
        run: |
          $version = "${{ inputs.tag }}" -replace '^v',''
          # The script's File/icon paths are relative to packaging\windows.
          Push-Location packaging\windows
          makensis "/DVERSION=$version" installer.nsi
          Pop-Location
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Move-Item packaging\windows\whirr-setup-*.exe dist\
          Copy-Item target\release\whirr.exe dist\whirr-windows-x64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------- Publish
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [prepare, linux, macos, windows]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          # Full history + tags so the notes step can diff against the last tag.
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Install nfpm
        env:
          NFPM_TOOL_VERSION: "2.43.0"
        run: |
          curl -fsSL -o /tmp/nfpm.deb \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_TOOL_VERSION}/nfpm_${NFPM_TOOL_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/nfpm.deb

      - name: Build .deb and .rpm packages
        env:
          TAG: ${{ inputs.tag }}
        run: |
          export NFPM_VERSION="${TAG#v}"
          for arch in amd64 arm64; do
            rpmarch=$([ "$arch" = amd64 ] && echo x86_64 || echo aarch64)
            bindir="$(mktemp -d)"
            tar -C "$bindir" -xzf "dist/whirr-linux-${arch}.tar.gz" whirr
            NFPM_ARCH="$arch" NFPM_BINARY="$bindir/whirr" \
              nfpm package -f packaging/nfpm.yaml -p deb -t "dist/whirr_${NFPM_VERSION}_linux_${arch}.deb"
            NFPM_ARCH="$arch" NFPM_BINARY="$bindir/whirr" \
              nfpm package -f packaging/nfpm.yaml -p rpm -t "dist/whirr-${NFPM_VERSION}-1.${rpmarch}.rpm"
          done

      - name: Stage source archive and Arch PKGBUILD
        run: |
          version="${TAG#v}"
          sh scripts/stage-arch-release.sh "$version" dist
        env:
          TAG: ${{ inputs.tag }}

      - name: Generate checksums
        run: (cd dist && sha256sum -- * > ../checksums.txt && mv ../checksums.txt .)

      - uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/checksums.txt
          if-no-files-found: error

      - name: Build release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ inputs.tag }}
        env:
          OUTPUT: release-notes.md

      - name: Show release notes
        run: cat release-notes.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: ${{ needs.prepare.outputs.sha }}
          body_path: release-notes.md
          make_latest: true
          files: dist/*
          fail_on_unmatched_files: true

  # ---------------------------------------------------------------- Homebrew tap
  # Push the refreshed cask to samuelb/homebrew-tap so `brew upgrade` picks up
  # the new release. Requires a HOMEBREW_TAP_TOKEN secret: a PAT (or fine-grained
  # token) with write access to the tap repo (the default GITHUB_TOKEN can't push
  # to another repository).
  homebrew:
    name: Render Homebrew tap files
    runs-on: ubuntu-latest
    needs: [prepare, publish]
    steps:
      - name: Check out whirr (for the tap templates + stage script)
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums

      - name: Render tap files
        env:
          TAG: ${{ inputs.tag }}
        run: sh scripts/stage-homebrew.sh "${TAG#v}" checksums.txt rendered

      - uses: actions/upload-artifact@v4
        with:
          name: homebrew-tap-files
          path: rendered/
          if-no-files-found: error

  publish-homebrew:
    name: Publish Homebrew tap
    needs: homebrew
    uses: samuelb/homebrew-tap/.github/workflows/publish.yml@main
    with:
      artifact_name: homebrew-tap-files
      commit_message: "whirr ${{ inputs.tag }}"
    secrets:
      tap_token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
