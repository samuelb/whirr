<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Whirr logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d212c"/>
      <stop offset="1" stop-color="#14161d"/>
    </linearGradient>
  </defs>
  <style>
    .rip { animation: ripple 2.6s ease-in-out infinite; }
    .r2 { animation-delay: .5s; }
    @keyframes ripple { 0%, 100% { opacity: .35; } 35% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .rip { animation: none; } }
  </style>
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <!-- a small speaker, indicator light on, throwing off two waves of sound -->
  <g transform="translate(2 -5.5)">
    <circle cx="196" cy="316" r="102" fill="#ffc233"/>
    <circle cx="237" cy="275" r="21" fill="#14161d"/>
    <g fill="none" stroke="#ffc233" stroke-width="40" stroke-linecap="round">
      <path class="rip" d="M247.3 175 A150 150 0 0 1 340.9 277.2"/>
      <path class="rip r2" d="M293.2 125.3 A214 214 0 0 1 394.4 235.8"/>
    </g>
  </g>
</svg>
